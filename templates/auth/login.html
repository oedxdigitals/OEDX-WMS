{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:420px;">

    <div class="card shadow">

        <div class="card-body">

            <h3 class="text-center mb-4">
                OEDX WMS Login
            </h3>

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            <form method="POST">

                <div class="mb-3">

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required
                    >

                </div>

                <button
                    class="btn btn-primary w-100"
                    type="submit"
                >
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
