{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Goods Out</h2>

<a href="{{ url_for('goods_out.new') }}"
class="btn btn-primary mb-3">

New Goods Out

</a>

<table class="table table-bordered">

<tr>

<th>ID</th>

<th>Reference</th>

<th>Customer</th>

</tr>

{% for record in records %}

<tr>

<td>{{ record.id }}</td>

<td>{{ record.reference_no }}</td>

<td>{{ record.customer.company_name }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
